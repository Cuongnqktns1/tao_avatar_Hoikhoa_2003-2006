<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Avatar Theo Khung</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        canvas { border: 1px solid #ddd; max-width: 100%; height: auto; margin-top: 15px; background-color: #eee; }
        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; background: #28a745; color: white; font-weight: bold; }
        button:hover { background: #218838; }
        input[type="range"] { width: 200px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Tạo Avatar Sự Kiện Hội Khóa 20 năm - Trường THPT 1/5 Nghĩa Đàn Khóa 2003-2006</h2>
    <p>Chọn ảnh của bạn, căn chỉnh và tải về</p>
    
    <input type="file" id="upload" accept="image/*">
    <br>
    
    <canvas id="canvas" width="1000" height="1000"></canvas>
    
    <div class="controls">
        <label>Phóng to/Thu nhỏ:</label>
        <input type="range" id="zoom" min="0.1" max="3" step="0.01" value="1">
        
        <p><small>(Bạn có thể dùng chuột hoặc chạm tay để di chuyển ảnh bên dưới khung)</small></p>
        
        <button id="download">Tải Ảnh Của Bạn</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const upload = document.getElementById('upload');
    const zoomInput = document.getElementById('zoom');
    const downloadBtn = document.getElementById('download');

    let userImg = new Image();
    let frameImg = new Image();
    
    // THAY ĐỔI ĐƯỜNG DẪN FILE KHUNG CỦA ANH TẠI ĐÂY
    frameImg.src = 'khung-avatar.png'; 

    let posX = 500, posY = 500, scale = 1;
    let isDragging = false, startX, startY;

    frameImg.onload = () => draw();

    upload.onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            userImg.src = event.target.result;
            userImg.onload = () => {
                // Tự động căn giữa ảnh khi mới tải lên
                scale = canvas.width / userImg.width;
                zoomInput.value = scale;
                posX = canvas.width / 2;
                posY = canvas.height / 2;
                draw();
            };
        };
        reader.readAsDataURL(file);
    };

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (userImg.src) {
            ctx.save();
            ctx.translate(posX, posY);
            ctx.scale(scale, scale);
            ctx.drawImage(userImg, -userImg.width / 2, -userImg.height / 2);
            ctx.restore();
        }
        
        // Vẽ khung đè lên trên ảnh user
        ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
    }

    // Xử lý zoom
    zoomInput.oninput = () => {
        scale = parseFloat(zoomInput.value);
        draw();
    };

    // Xử lý kéo thả ảnh
    canvas.onmousedown = (e) => {
        isDragging = true;
        startX = e.offsetX * (canvas.width / canvas.clientWidth);
        startY = e.offsetY * (canvas.height / canvas.clientHeight);
    };

    window.onmouseup = () => isDragging = false;

    canvas.onmousemove = (e) => {
        if (isDragging) {
            const mouseX = e.offsetX * (canvas.width / canvas.clientWidth);
            const mouseY = e.offsetY * (canvas.height / canvas.clientHeight);
            posX += (mouseX - startX);
            posY += (mouseY - startY);
            startX = mouseX;
            startY = mouseY;
            draw();
        }
    };

    // Tải ảnh về
    downloadBtn.onclick = () => {
        const link = document.createElement('a');
        link.download = 'avatar-cua-toi.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    };
</script>

</body>
</html>
